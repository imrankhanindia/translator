<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Arabic ↔ Turkish Translator - Working Version</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0f1a;
    font-family: system-ui, 'Segoe UI', sans-serif;
    padding: 16px;
    min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { text-align: center; color: #2dd4bf; font-size: 1.5rem; margin-bottom: 16px; }
  
  .status {
    background: #0f172a;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 16px;
    border-left: 4px solid #2dd4bf;
  }
  .mic-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #475569;
    margin-right: 8px;
  }
  .mic-dot.active { background: #10b981; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  
  .mode-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .mode-btn {
    padding: 8px 16px;
    border-radius: 40px;
    background: #1e293b;
    color: #94a3b8;
    border: none;
    font-size: 13px;
    cursor: pointer;
  }
  .mode-btn.active {
    background: #2dd4bf20;
    color: #2dd4bf;
    border: 1px solid #2dd4bf;
  }
  
  .panels {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  
  .panel {
    background: #11161c;
    border-radius: 20px;
    padding: 16px;
    border: 1px solid rgba(45,212,191,0.2);
  }
  .panel-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 12px; text-align: center; }
  .panel-title.ar { color: #2dd4bf; }
  .panel-title.tr { color: #c084fc; }
  
  .box {
    background: #030712;
    border-radius: 16px;
    padding: 14px;
    margin: 10px 0;
  }
  .label { font-size: 10px; color: #6c86a3; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .text { color: #e2e8f0; font-size: 1rem; line-height: 1.4; min-height: 50px; word-break: break-word; }
  
  .buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  button {
    padding: 12px 24px;
    font-size: 14px;
    font-weight: bold;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.2s;
  }
  #startBtn { background: #0f3b3a; color: #2dd4bf; border: 1px solid #2dd4bf; }
  #stopBtn { background: #2c1a1e; color: #f87171; display: none; }
  #clearBtn { background: #1e293b; color: #facc15; }
  
  footer { text-align: center; margin-top: 20px; color: #4a5a66; font-size: 11px; }
  
  @media (min-width: 700px) {
    .panels { grid-template-columns: 1fr 1fr; }
    body { padding: 24px; }
    h1 { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎙️ العربية ↔ Türkçe</h1>

  <div class="mode-selector">
    <button class="mode-btn active" data-mode="both">🌍 Both Languages</button>
    <button class="mode-btn" data-mode="ar">🇸🇦 Arabic Only</button>
    <button class="mode-btn" data-mode="tr">🇹🇷 Turkish Only</button>
  </div>

  <div class="status">
    <span id="micDot" class="mic-dot"></span>
    <span id="statusMsg">⚡ Click START and speak</span>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-title ar">🇸🇦 Arabic → Turkish</div>
      <div class="box">
        <div class="label">🎙️ YOU SAID (ARABIC)</div>
        <div class="text" id="arSpoken">—</div>
      </div>
      <div class="box">
        <div class="label">🔊 TURKISH TRANSLATION</div>
        <div class="text" id="arTrans">—</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title tr">🇹🇷 Turkish → Arabic</div>
      <div class="box">
        <div class="label">🎙️ YOU SAID (TURKISH)</div>
        <div class="text" id="trSpoken">—</div>
      </div>
      <div class="box">
        <div class="label">🔊 ARABIC TRANSLATION</div>
        <div class="text" id="trTrans">—</div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button id="startBtn">🎤 START</button>
    <button id="stopBtn">⏹️ STOP</button>
    <button id="clearBtn">🗑️ CLEAR</button>
  </div>
  <footer>
    💡 Speak a phrase → It translates once → Stops<br>
    Use headphones to prevent echo/repeating
  </footer>
</div>

<script>
// ========== SIMPLE WORKING VERSION ==========
// No complex muting - just simple translation

let isRunning = false;
let currentMode = "both";
let arRecog = null;
let trRecog = null;

// Store text
let arHistory = "";
let trHistory = "";

// Prevent rapid repeats (time-based)
let lastArPhrase = "";
let lastTrPhrase = "";
let lastArTime = 0;
let lastTrTime = 0;

// Timers
let arTimer = null;
let trTimer = null;

// DOM elements
const arSpoken = document.getElementById('arSpoken');
const trSpoken = document.getElementById('trSpoken');
const arTrans = document.getElementById('arTrans');
const trTrans = document.getElementById('trTrans');
const statusMsg = document.getElementById('statusMsg');
const micDot = document.getElementById('micDot');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const clearBtn = document.getElementById('clearBtn');
const modeBtns = document.querySelectorAll('.mode-btn');

// Translation function
async function translate(text, from, to) {
  if (!text || text.trim().length < 2) return "";
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
    const res = await fetch(url);
    const data = await res.json();
    let result = data?.responseData?.translatedText || text;
    result = result.replace(/\[UNK\]/g, '').replace(/&quot;/g, '"').trim();
    return result;
  } catch(e) {
    console.log("Translation error:", e);
    return text;
  }
}

// Speak function (with simple cooldown to prevent loops)
function speak(text, lang) {
  if (!text || text.trim().length < 2) return;
  try {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang === 'ar' ? 'ar-EG' : 'tr-TR';
    utterance.rate = 0.85;
    window.speechSynthesis.speak(utterance);
  } catch(e) {
    console.log("Speech error:", e);
  }
}

// Translate Arabic to Turkish
async function doArabicTranslate(arabicText) {
  if (!arabicText || arabicText.trim().length < 2) return;
  
  // Prevent same phrase within 3 seconds
  const now = Date.now();
  if (arabicText === lastArPhrase && (now - lastArTime) < 3000) {
    console.log("Skipping repeat Arabic:", arabicText);
    return;
  }
  
  lastArPhrase = arabicText;
  lastArTime = now;
  
  // Show translating
  arTrans.innerHTML = "⏳ Translating...";
  
  const translated = await translate(arabicText, 'ar', 'tr');
  arTrans.innerHTML = translated;
  
  // Speak the translation
  speak(translated, 'tr');
}

// Translate Turkish to Arabic
async function doTurkishTranslate(turkishText) {
  if (!turkishText || turkishText.trim().length < 2) return;
  
  // Prevent same phrase within 3 seconds
  const now = Date.now();
  if (turkishText === lastTrPhrase && (now - lastTrTime) < 3000) {
    console.log("Skipping repeat Turkish:", turkishText);
    return;
  }
  
  lastTrPhrase = turkishText;
  lastTrTime = now;
  
  // Show translating
  trTrans.innerHTML = "⏳ جاري الترجمة...";
  
  const translated = await translate(turkishText, 'tr', 'ar');
  trTrans.innerHTML = translated;
  
  // Speak the translation
  speak(translated, 'ar');
}

// Create Arabic recognizer - SIMPLE VERSION
function createArabicRecognizer() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    statusMsg.innerHTML = '❌ Browser not supported';
    return null;
  }
  
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'ar-EG';
  
  recognition.onstart = () => {
    console.log("Arabic recognition started");
    micDot.classList.add('active');
    if (currentMode === "both" || currentMode === "ar") {
      statusMsg.innerHTML = '🎙️ Listening for ARABIC...';
    }
  };
  
  recognition.onresult = (event) => {
    if (!isRunning) return;
    
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        const text = event.results[i][0].transcript.trim();
        console.log("Arabic detected:", text);
        
        if (text && text.length > 1) {
          // Add to history
          arHistory = arHistory + " " + text;
          arSpoken.innerHTML = arHistory.trim() || "—";
          
          // Clear previous timer
          if (arTimer) clearTimeout(arTimer);
          
          // Wait a moment to see if user continues speaking
          arTimer = setTimeout(() => {
            if (isRunning) {
              doArabicTranslate(text);
            }
          }, 500);
        }
      }
    }
  };
  
  recognition.onerror = (event) => {
    console.log("Arabic error:", event.error);
    if (event.error === 'not-allowed') {
      statusMsg.innerHTML = '❌ Microphone access denied. Please allow microphone.';
      stopAll();
    } else if (event.error === 'no-speech') {
      // Normal - no speech detected
      console.log("No speech detected");
    }
  };
  
  recognition.onend = () => {
    console.log("Arabic recognition ended");
    // Auto-restart if still running
    if (isRunning && (currentMode === "both" || currentMode === "ar")) {
      setTimeout(() => {
        if (isRunning && arRecog) {
          try {
            arRecog.start();
            console.log("Arabic restarted");
          } catch(e) {
            console.log("Failed to restart Arabic:", e);
          }
        }
      }, 300);
    }
  };
  
  return recognition;
}

// Create Turkish recognizer - SIMPLE VERSION
function createTurkishRecognizer() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    statusMsg.innerHTML = '❌ Browser not supported';
    return null;
  }
  
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'tr-TR';
  
  recognition.onstart = () => {
    console.log("Turkish recognition started");
    if (currentMode === "both" || currentMode === "tr") {
      statusMsg.innerHTML = '🎙️ Listening for TURKISH...';
    }
  };
  
  recognition.onresult = (event) => {
    if (!isRunning) return;
    
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        const text = event.results[i][0].transcript.trim();
        console.log("Turkish detected:", text);
        
        if (text && text.length > 1) {
          // Add to history
          trHistory = trHistory + " " + text;
          trSpoken.innerHTML = trHistory.trim() || "—";
          
          // Clear previous timer
          if (trTimer) clearTimeout(trTimer);
          
          // Wait a moment to see if user continues speaking
          trTimer = setTimeout(() => {
            if (isRunning) {
              doTurkishTranslate(text);
            }
          }, 500);
        }
      }
    }
  };
  
  recognition.onerror = (event) => {
    console.log("Turkish error:", event.error);
    if (event.error === 'not-allowed') {
      statusMsg.innerHTML = '❌ Microphone access denied. Please allow microphone.';
      stopAll();
    }
  };
  
  recognition.onend = () => {
    console.log("Turkish recognition ended");
    // Auto-restart if still running
    if (isRunning && (currentMode === "both" || currentMode === "tr")) {
      setTimeout(() => {
        if (isRunning && trRecog) {
          try {
            trRecog.start();
            console.log("Turkish restarted");
          } catch(e) {
            console.log("Failed to restart Turkish:", e);
          }
        }
      }, 300);
    }
  };
  
  return recognition;
}

// Request microphone
async function requestMicrophone() {
  try {
    statusMsg.innerHTML = '🎤 Requesting microphone...';
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(track => track.stop());
    statusMsg.innerHTML = '✅ Microphone ready! Click START';
    return true;
  } catch(err) {
    console.log("Mic error:", err);
    statusMsg.innerHTML = '❌ Microphone access denied. Please check permissions.';
    return false;
  }
}

// Start translator
async function startTranslator() {
  if (isRunning) return;
  
  // Check support
  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    statusMsg.innerHTML = '❌ Speech recognition not supported in this browser. Use Chrome or Edge.';
    return;
  }
  
  // Request permission
  const hasPermission = await requestMicrophone();
  if (!hasPermission) return;
  
  // Create recognizers if needed
  if (!arRecog) {
    arRecog = createArabicRecognizer();
  }
  if (!trRecog) {
    trRecog = createTurkishRecognizer();
  }
  
  if (!arRecog || !trRecog) {
    statusMsg.innerHTML = '❌ Failed to create speech recognizers';
    return;
  }
  
  // Reset
  arHistory = "";
  trHistory = "";
  lastArPhrase = "";
  lastTrPhrase = "";
  arSpoken.innerHTML = "—";
  trSpoken.innerHTML = "—";
  arTrans.innerHTML = "—";
  trTrans.innerHTML = "—";
  
  isRunning = true;
  micDot.classList.add('active');
  
  // Start recognizers based on mode
  if (currentMode === "both" || currentMode === "ar") {
    try {
      arRecog.start();
      console.log("Arabic started");
    } catch(e) {
      console.log("Error starting Arabic:", e);
    }
  }
  
  if (currentMode === "both" || currentMode === "tr") {
    setTimeout(() => {
      try {
        if (trRecog) trRecog.start();
        console.log("Turkish started");
      } catch(e) {
        console.log("Error starting Turkish:", e);
      }
    }, 200);
  }
  
  startBtn.disabled = true;
  stopBtn.style.display = 'inline-flex';
  statusMsg.innerHTML = '🎙️ Listening! Speak ' + 
    (currentMode === "both" ? "Arabic or Turkish" : (currentMode === "ar" ? "Arabic" : "Turkish"));
}

// Stop translator
function stopTranslator() {
  isRunning = false;
  micDot.classList.remove('active');
  
  if (arRecog) {
    try { arRecog.stop(); } catch(e) {}
  }
  if (trRecog) {
    try { trRecog.stop(); } catch(e) {}
  }
  
  if (arTimer) clearTimeout(arTimer);
  if (trTimer) clearTimeout(trTimer);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  
  startBtn.disabled = false;
  stopBtn.style.display = 'none';
  statusMsg.innerHTML = '⏹️ Stopped. Click START to resume.';
}

// Clear text
function clearText() {
  arHistory = "";
  trHistory = "";
  lastArPhrase = "";
  lastTrPhrase = "";
  arSpoken.innerHTML = "—";
  trSpoken.innerHTML = "—";
  arTrans.innerHTML = "—";
  trTrans.innerHTML = "—";
  statusMsg.innerHTML = '🗑️ Cleared. ' + (isRunning ? 'Continue speaking!' : 'Click START.');
}

// Change mode
function changeMode(mode) {
  currentMode = mode;
  modeBtns.forEach(btn => {
    if (btn.dataset.mode === mode) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  
  // Restart if running
  if (isRunning) {
    stopTranslator();
    setTimeout(() => startTranslator(), 500);
  }
}

// Event listeners
startBtn.onclick = startTranslator;
stopBtn.onclick = stopTranslator;
clearBtn.onclick = clearText;

modeBtns.forEach(btn => {
  btn.onclick = () => changeMode(btn.dataset.mode);
});

console.log("App loaded. Ready to start!");
</script>
</body>
</html>
